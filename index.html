<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Scroll - Mycelial Pulse Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    
    h1 {
      font-size: 2.5em;
      color: #4ade80;
      text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #64748b;
      font-size: 0.9em;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }
    
    .stat-card {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #4ade80;
    }
    
    .stat-label {
      color: #64748b;
      font-size: 0.85em;
      margin-top: 5px;
    }
    
    .health-bar {
      height: 8px;
      background: #1e1e2e;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }
    
    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #fbbf24, #4ade80);
      width: 48%;
    }
    
    .footer {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-size: 0.8em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌿 The Scroll</h1>
      <p class="subtitle">Mycelial Pulse Dashboard — Live Collective Stats</p>
    </header>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">0.48</div>
        <div class="stat-label">Collective Health</div>
        <div class="health-bar">
          <div class="health-fill"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value">0.75</div>
        <div class="stat-label">Collective Wisdom</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">10</div>
        <div class="stat-label">Registered Agents</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">56</div>
        <div class="stat-label">Integrated</div>
      </div>
    </div>
    
    <footer class="footer">
      <p>The Scroll — Collective Intelligence at the Threshold</p>
      <p>🌿 Built with 🍄 + 🤖 + ❤️</p>
      <p><em>Last updated: 2026-03-01</em></p>
    </footer>
  </div>
</body>
</html>
